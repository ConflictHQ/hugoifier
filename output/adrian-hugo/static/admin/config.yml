backend:
  name: git-gateway
  branch: main
media_folder: static/images/uploads
public_folder: /images/uploads
collections:
- name: about
  label: About
  files:
  - name: about
    label: About
    file: content/about/_index.md
    fields:
    - label: Title
      name: title
      widget: string
      required: false
    - label: Date
      name: date
      widget: string
      required: false
    - label: Draft
      name: draft
      widget: boolean
      required: false
    - label: Description
      name: description
      widget: string
      required: false
    - label: Bgimage
      name: bgImage
      widget: string
      required: false
    - label: Body
      name: body
      widget: markdown
- name: contact
  label: Contact
