- name: shop
  label: Shop
  folder: content/shop
  create: true
  slug: '{{slug}}'
  fields:
  - label: Title
    name: title
    widget: string
  - label: Date
    name: date
    widget: datetime
  - label: Description
    name: description
    widget: text
  - label: Categories
    name: categories
    widget: list
    required: false
  - label: Draft
    name: draft
    widget: boolean
    default: false
  - label: Bgimage
    name: bgImage
    widget: string
    required: false
  - label: Images
    name: images
    widget: list
    required: false
  - label: Price
    name: price
    widget: string
    required: false
  - label: Pricebefore
    name: priceBefore
    widget: string
    required: false
  - label: Colors
    name: colors
    widget: list
    required: false
  - label: Sizes
    name: sizes
    widget: list
    required: false
  - label: Productweight
    name: productWeight
    widget: string
    required: false
  - label: Dimensions
    name: dimensions
    widget: string
    required: false
  - label: Materials
    name: materials
    widget: string
    required: false
  - label: Body
    name: body
    widget: markdown
