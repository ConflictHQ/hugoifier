backend:
  name: git-gateway
  branch: main
media_folder: static/images/uploads
public_folder: /images/uploads
collections:
- name: about
  label: About
  files:
  - name: about
    label: About
    file: content/about/_index.md
    fields:
    - label: Title
      name: title
      widget: string
      required: false
    - label: Image
      name: image
      widget: string
      required: false
    - label: Description
      name: description
      widget: string
      required: false
    - label: Draft
      name: draft
      widget: boolean
      required: false
    - label: Education
      name: education
      widget: list
      required: false
    - label: Skill
      name: skill
      widget: list
      required: false
    - label: Body
      name: body
      widget: markdown
- name: contact
  label: Contact
  files:
  - name: contact
    label: Contact
    file: content/contact/_index.md
    fields:
    - label: Title
      name: title
      widget: string
      required: false
    - label: Description
      name: description
      widget: string
      required: false
    - label: Draft
      name: draft
      widget: boolean
      required: false
    - label: Body
      name: body
      widget: markdown
- name: post
  label: Post
  folder: content/post
  create: true
  slug: '{{slug}}'
  fields:
  - label: Title
    name: title
    widget: string
  - label: Date
    name: date
    widget: datetime
  - label: Description
    name: description
    widget: text
  - label: Image
    name: image
    widget: image
    required: false
  - label: Categories
    name: categories
    widget: list
    required: false
  - label: Draft
    name: draft
    widget: boolean
    default: false
  - label: Body
    name: body
    widget: markdown
- name: privacy-policy
  label: Privacy Policy
  files:
  - name: privacy-policy
    label: Privacy Policy
    file: content/privacy-policy/_index.md
    fields:
    - label: Title
      name: title
      widget: string
      required: false
    - label: Description
      name: description
      widget: string
      required: false
    - label: Draft
      name: draft
      widget: boolean
      required: false
    - label: Body
      name: body
      widget: markdown
